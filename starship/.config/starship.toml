[cmd_duration]
show_milliseconds = true
min_time = 500
format = '[ ¾▒Ğş $duration ]($style)'
style = "fg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[time]
disabled = false
use_12hr = false
time_format = "%a %R"
format = '[ ¾░Ñö $time ]($style)'
style = "bold flamingo"

[line_break]
disabled = false

