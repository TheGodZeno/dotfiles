[git_branch]
symbol = "¯éá"
format = 'on [$symbol $branch(:$remote_branch) ]($style)'
style = "bold green"
ignore_branches = ['master', 'main']

[git_commit]
only_detached = true
style = "dimmed mauve"
tag_disabled = false
format = "[\\($hash$tag\\) ]($style)"

[git_state]
style = "bold red"
format = "[\\($state( $progress_current/$progress_total)\\) ]($style)"

[git_status]
style = "bold maroon"
format = "[\\[$all_status$ahead_behind\\] ]($style)"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
disabled = false
format = "\\([+$added]($added_style)/[-$deleted]($deleted_style)\\) "

[fill]
symbol = ' '

[helm]
symbol = "¯ş╗ "
style = "bold deep-blue"

[jobs]
symbol = "[¯«ó ](blue italic)"

[julia]
symbol = "¯İñ "

[lua]
symbol = "¾░ó▒ "

# Enable later.
[kubernetes]
disabled = true

[netns]
symbol = "­şîÉ "
style = "bold yellow"

[hostname]
ssh_only = true
ssh_symbol = "¯¼║­şîÅ "
style = "bold teal"
format = '[$ssh_symbol$hostname ]($style)'

[nodejs]
symbol = "¯┤ı "

[c]
